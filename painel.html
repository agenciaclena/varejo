*{

/* ================= HEADER ================= */
header{
  background:var(--dark);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

header div:first-child{
  font-size:18px;
  font-weight:800;
  letter-spacing:0.5px;
}

#status{
  font-size:12px;
  opacity:0.7;
}

/* ================= CONTROLS ================= */
.controls{
  padding:15px;
  background:#fff;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid #e5e7eb;
}

input,button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:13px;
}

button{
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* ================= KPI ================= */
#kpis{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.kpi{
  background:linear-gradient(180deg,#fff,#f8fafc);
  border-radius:14px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.kpi .label{
  font-size:12px;
  color:var(--sub);
}

.kpi .value{
  font-size:22px;
  font-weight:800;
  margin-top:5px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); /* 🔥 menor */
  gap:20px;
  padding:20px;
}

/* ================= CARD ================= */
.card{
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:all 0.2s ease;
  position:relative;
}

.card:hover{

  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.empresa{
  font-size:13px;
  color:var(--sub);
  font-weight:700;
  margin-bottom:6px;
}

.valor{
  font-size:30px;
  font-weight:800;
  color:var(--success);
  transition:0.3s;
}

/* ================= LISTA ================= */
.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:4px;
  border-bottom:1px dashed #e5e7eb;
  padding-bottom:2px;

/* ================= METAS ================= */

  display:flex;
  gap:20px;
  margin-top:12px;

.bola{

  height:80px;
  border-radius:50%;

  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:800;
  position:relative;
}

.bola::before{

  width:60px;
  height:60px;
  background:#fff;
  border-radius:50%;
}

.bola span{
  position:relative;
  z-index:2;

  background:conic-gradient(#2563eb var(--p), #e5e7eb 0);

/* OURO */
.ouro{
  background:conic-gradient(#eab308 var(--p), #e5e7eb 0);

/* ================= BADGES ================= */
.badge{

  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  margin-top:6px;

.badge-success{

.badge-danger{
  background:#fee2e2;
  color:#991b1b;
}

.badge-warning{
  background:#fef3c7;

/* ================= BOXES ================= */
.box{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  font-size:12px;

.box-gray{

// ================= TURNO =================
function turno(){
  const now = new Date()

  const inicio = new Date(now)
  inicio.setHours(5,0,0,0)

  const fim = new Date(inicio)
  fim.setDate(fim.getDate()+1)

}

// ================= PARSE =================
function parse(v){
const raw = lerJSONSeguro(v.raw)
if(!raw) return null
  // 🔥 PRIORIDADE 1: data completa do cupom
  let dataHora = raw?.dataHoraFechamentoCupom

  // 🔥 PRIORIDADE 2: montar manual (data + hora)
  if(!dataHora && raw?.data && raw?.hora){
    const h = raw.hora.padStart(4,"0")
    dataHora = `${raw.data}T${h.slice(0,2)}:${h.slice(2,4)}:00`
  }

  // 🔥 FALLBACK (último caso)
  if(!dataHora && raw?.data){
    dataHora = raw.data + "T00:00:00"
  }

return {
  data: dataHora,
  valor: Number(raw?.valor || 0),
  finais: raw?.finalizacoes || [],
  cancelado: raw?.cancelada || raw?.cancelado || false
}
}

// ================= PROCESS =================
function process(data, inicio, fim){

  const result = {}
  const seen = new Set() // 🔥 CONTROLE DE DUPLICADOS

  data.forEach(v=>{

const raw = lerJSONSeguro(v.raw)

if(!raw) return null

const id = raw?.id
    // 🔥 BLOQUEIO DE DUPLICADOS
    if(!id) return
    if(seen.has(id)) return
    seen.add(id)

const p = parse(v)
if(!p || !p.data) return

const d = new Date(p.data)
const hora = d.getHours()

const isAlmoco = hora >= 10 && hora < 15



    
// NÃO mexe no horário aqui
if(d < inicio || d > fim) return

const empBase = v.empresa_id

const caixa = Number(raw?.caixa || raw?.numeroCaixa || raw?.caixaId || 0)

let emp = empBase

if(empBase === "VAREJO_URL_MERCATTO"){

  if(caixa >= 1 && caixa <= 5){
    emp = "MERCATTO EMPÓRIO"
  } else if(caixa >= 6){
    emp = "MERCATTO RESTAURANTE"
  }

}
    if(!result[emp]){
      result[emp]={
total:0,
vendas:0,
cancelados:0,
valorCancelado:0,
finais:{},

// 🔥 NOVO
almocoTotal:0,
almocoVendas:0
      }
    }

    // 🔴 CANCELADOS
    if(p.cancelado){
      result[emp].cancelados++
      result[emp].valorCancelado += p.valor
      return
    }

    // ✅ VÁLIDOS
const totalCupom = p.valor

p.finais.forEach(f=>{
const valorBruto = Number(f.valor || 0)
const troco = Number(f.troco || 0)

// 🔥 REMOVE TROCO
const valor = valorBruto - troco
  
  const idf = Number(f.finalizadoraId)
const nome = MAPA[empBase]?.[idf] || "OUTROS"
  result[emp].finais[nome] =
    (result[emp].finais[nome] || 0) + valor
})

    
    result[emp].total += totalCupom
    result[emp].vendas++
if(isAlmoco){
  result[emp].almocoTotal += totalCupom
  result[emp].almocoVendas++
}
  })

  return result
}

// ================= GRAFICO =================
let chart
function renderChart(d){

  const labels = Object.keys(d)
  const values = labels.map(e=>d[e].total)

  if(chart) chart.destroy()

  chart = new Chart(grafico,{
    type:"bar",
    data:{
      labels,
      datasets:[{
        label:"Faturamento",
        data:values
      }]
    }
  })
}




function mesOperacional(){

  const now = new Date()

  const inicio = new Date(
    now.getFullYear(),
    now.getMonth(),
    1,
    5,0,0
  )

  const fim = new Date()

  return { inicio, fim }
}









  
// ================= LOAD =================
async function load(inicio, fim){
  document.getElementById("loading").style.display = "flex" // ✅ AQUI

  let all = []
  let from = 0
  const step = 300

  // 🔥 CONVERTE DATA UMA VEZ (evita custo repetido)
  const inicioISO = inicio.toISOString()
  const fimISO = fim.toISOString()

  while(true){

    const { data, error } = await sb
      .from("cupons_importados")
.select("empresa_id,data,raw,id")
      .gte("data", inicioISO)        // 🔥 FILTRO NO BANCO
      .lte("data", fimISO)
      .range(from, from + step - 1)

    if(error){
      console.error("❌ ERRO SUPABASE:", error)
      break
    }

    if(!data || data.length === 0) break

    all = all.concat(data)

    if(data.length < step) break

    from += step
  }

  console.log("📊 TOTAL CARREGADO:", all.length)

// 🔵 dados do filtro (mantém igual)
const dados = process(all, inicio, fim)

// 🟡 dados do mês (NOVO)
const mes = mesOperacional()

// 🔵 PRIMEIRO RENDER (RÁPIDO)
render(dados, {})

  const mes = mesOperacional()

      .gte("data", mes.inicio.toISOString())
      .lte("data", mes.fim.toISOString())
      .range(fromMes, fromMes + stepMes - 1)

    if(error){
      console.error("❌ ERRO MÊS:", error)
      break
    }

    if(!data || data.length === 0) break

    allMes = allMes.concat(data)

    if(data.length < stepMes) break

    fromMes += stepMes
  }

  console.log("📊 TOTAL MÊS:", allMes.length)

  const dadosMes = process(allMes, mes.inicio, mes.fim)

  // 🔥 RE-RENDER COM META
  render(dados, dadosMes)

},100)

  document.getElementById("status").innerText =
    "Atualizado " + new Date().toLocaleTimeString()

  document.getElementById("periodo").innerText =
    `Período: ${inicio.toLocaleString()} → ${fim.toLocaleString()}`
  document.getElementById("loading").style.display = "none" // ✅ AQUI
}

  const pad = n => String(n).padStart(2,"0")

  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`
}

function lerJSONSeguro(raw){

  try{

    // já é objeto → retorna direto
    if(typeof raw === "object"){
      return raw
    }

    // não é string → inválido
    if(typeof raw !== "string"){
      return null
    }

    // 1º parse
    let parsed = JSON.parse(raw)

    // se ainda for string → parse de novo
    if(typeof parsed === "string"){
      parsed = JSON.parse(parsed)
    }

    return parsed

  }catch(e){
    console.log("❌ ERRO AO LER JSON:", e.message)
    console.log("📦 RAW PROBLEMÁTICO:", raw)
    return null
  }
}
