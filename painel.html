<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CARNEIRO HOLDING</title>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>

:root{
  --bg:#020617;
  --card:#0f172a;
  --card2:#020617;
  --primary:#2563eb;
  --success:#22c55e;
  --danger:#ef4444;
  --warning:#f59e0b;
  --text:#ffffff;
  --sub:#94a3b8;
  --border:#1e293b;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

/* ================= BASE ================= */
html,body{
  width:100%;
  height:100%;
  overflow:hidden; /* 🔥 SEM SCROLL PRA TV */
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  height:50px;
  background:#020617;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 15px;
}

header div:first-child{
  font-size:13px;
  font-weight:800;
  letter-spacing:1px;
}

#status{
  font-size:11px;
  color:var(--sub);
}

/* ================= REMOVE CONTROLS ================= */
.controls,
#kpis,
#periodo{
  display:none !important;
}

/* ================= GRID FIXO TV ================= */
.grid{
  height: calc(100vh - 50px);
  display:grid;

  grid-template-columns: 1fr 2fr;
  grid-template-rows: repeat(3, 1fr);

  gap:8px;
  padding:8px;
}



  /* LINHA 1 */
#villa        { grid-column:1; grid-row:1; }

/* LINHA 2 */
#delicia      { grid-column:1; grid-row:2; }



/* LINHA 3 */
#padaria      { grid-column:1; grid-row:3; }
/* ================= CARD ================= */
.card{
  background:linear-gradient(180deg,var(--card),var(--card2));
  border-radius:14px;
  padding:6px 8px 8px 8px; /* menos espaço em cima */
  overflow:hidden; /* 🔥 IMPEDE ESTOURO */
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
  border:1px solid var(--border);
  height:100%;
    min-height:0; /* 🔥 PERMITE ENCOLHER */
}

/* ================= TOP ================= */
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:4px;
}

/* ================= LOGO ================= */
.logo{
  width:38px;
  height:38px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--border);

  margin-top:-2px; /* 🔥 ajuste fino */
  transform:none; /* 🔥 remove o excesso */
}
@media (min-width:1400px){
  .logo{
    margin-top:-1px;
  }
}
/* ================= VALOR ================= */
.valor{
  font-size:clamp(10px, 1.4vw, 12px);
  font-weight:800;
  color:var(--success);
  letter-spacing:0.5px;
}

/* ================= VENDAS ================= */
.vendas{
  font-size:12px;
  color:var(--sub);
  margin-top:4px;
}


/* ================= MÊS ================= */
.mes{
  margin-top:8px;
  padding:8px;
  border-radius:8px;
  background:linear-gradient(135deg,#020617,#020617);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:clamp(10px, 1.5vw, 12px);
  border:1px solid var(--border);
}

.mes span:last-child{
  font-size:14px;
  font-weight:800;
  color:#22c55e;
}

/* ================= CANCELADOS ================= */
.cancel{
  font-size:11px;
  color:var(--danger);
  margin-top:4px;
}

/* ================= METAS ================= */
.metas{
  display:grid;
  grid-template-columns: auto auto;
  justify-content:center;
  gap:6px 6px;
}

.mini-ticket{
  grid-column: span 2;

  display:flex;
  flex-direction:column;

  width:80px;
  margin:0 auto;

  padding:5px 6px;

  border-radius:10px;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
}

/* título */
.mini-label{
  font-size:8px;
  color:#64748b;
  font-weight:600;
  text-align:center;
  margin-bottom:2px;
}

/* linha correta */
.mini-valores{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
}

/* vendas */
.mini-vendas{
  font-size:9px;
  color:#94a3b8;
  font-weight:700;
}

/* ticket */
.mini-ticket-text{
  font-size:10px;
  color:#22c55e;
  font-weight:800;
}
/* BOLINHA */
.bola{
  width:36px;
  height:36px;
  border-radius:50%;
  position:relative;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:11px;
  font-weight:700;

  overflow:hidden;
}

/* FURO INTERNO (define a espessura) */
.bola::before{
  content:"";
  position:absolute;
  width:28px;
  height:28px;
  background:#020617;
  border-radius:50%;
  z-index:1;
}

/* TEXTO % */
.bola span{
  position:relative;
  z-index:2;
  font-size:11px;
  font-weight:700;
}

/* CORES */
.prata{
  background:conic-gradient(#c0c0c0 var(--p), #1e293b 0);
}

.ouro{
  background:conic-gradient(#d4af37 var(--p), #1e293b 0);
}

/* ================= TOTAL CARD ================= */
.total-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.total-card .titulo{
  font-size:12px;
  color:var(--sub);
}

.total-card .valor{
  font-size:34px;
}

/* ================= STATUS ================= */
.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  position:fixed;
  top:8px;
  right:10px;
  box-shadow:0 0 8px #22c55e;
}

.status-dot.loading{
  background:#f59e0b;
  box-shadow:0 0 8px #f59e0b;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:1 }
  50%{ transform:scale(1.3); opacity:0.5 }
  100%{ transform:scale(1); opacity:1 }
}

/* ================= POPUP ================= */
#popupOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

#popupOverlay.active{
  display:flex;
}

#popupBox{
  background:#020617;
  border-radius:14px;
  padding:20px;
  width:350px;
  max-height:80vh;
  overflow:auto;
  border:1px solid var(--border);
}

/* ================= RESPONSIVO ================= */

/* TV GRANDE */
@media (min-width:1400px){
  .valor{ font-size:32px; }
}

/* TABLET */
@media (max-width:900px){
  .grid{
    grid-template-columns:1fr;
    grid-template-rows:auto;
    overflow:auto;
  }

  html,body{
    overflow:auto;
  }
}




.bola span{
  font-weight:800;
}


.almoco{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;

  margin-top:6px;
  padding:6px;
  border-radius:8px;
  background:#020617;
  font-size:clamp(9px, 1.3vw, 11px);
  border:1px solid var(--border);
}

#extra{
  grid-column: span 3;
}

#barraResumo{
  display:flex;
  align-items:center;
  gap:12px;

  padding:4px 10px;
  border-radius:8px;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);

  font-size:11px;
  color:#94a3b8;

  backdrop-filter: blur(6px);
}

/* destaque leve */
#barraResumo b{
  color:#22c55e;
  font-weight:700;
}.grid{
  height: calc(100vh - 50px);
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap:8px;
  padding:8px;
}

/* 🔵 ESQUERDA (3 LINHAS) */
.col-esquerda{
  display:grid;
  grid-template-rows: repeat(3, 1fr);
  gap:8px;
}

/* 🟢 DIREITA (3 COLUNAS AUTOMÁTICAS) */
.col-direita{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 1fr;
  gap:8px;
}
/* opcional: esconder extra */
#extra{
  display:none;
}



  .grid{
  height: calc(100vh - 50px);
  display:grid;

  grid-template-columns: 1fr 2fr; /* esquerda menor, direita maior */
  grid-template-rows: repeat(3, 1fr);

  gap:8px;
  padding:8px;
}
.right-grid{
  grid-column:2;
  grid-row:1 / 4;

  display:grid;

  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;

  gap:8px;
}
.valor-mes{
  font-size:clamp(12px, 1.6vw, 16px);
  font-weight:900;
  color:#22c55e;
  letter-spacing:0.5px;
}





.info-box{
  display:flex;
  flex-direction:column;
  margin-top:2px;
}

.vendas-linha{
  font-size:11px;
  color:#94a3b8;
  line-height:1.2;
}

.ticket-linha{
  font-size:11px;
  color:#94a3b8;
  line-height:1.2;
}

.cancel-inline{
  margin-left:6px;
  font-size:10px;
  color:#ef4444;
  font-weight:700;
}
.metas div{
  text-align:center;
}
    
</style>
</head>

<body>

<div id="statusDot" class="status-dot"></div>
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <div>CARNEIRO HOLDING</div>
    <div id="barraResumo"></div>
  </div>
  <div id="status"></div>
</header>

<!-- GRID FIXO TV -->
<div class="grid">

  <!-- ESQUERDA -->
  <div id="villa" class="card"></div>
  <div id="delicia" class="card"></div>
  <div id="padaria" class="card"></div>

  <!-- DIREITA (GRID INTERNA) -->
  <div class="right-grid">
    <div id="restaurante" class="card"></div>
    <div id="emporio" class="card"></div>
    <div id="mkids" class="card"></div>
    <div id="totalMercatto" class="card total-card"></div>
  </div>

</div>


<script>

// ================= CONFIG =================
const API_URL = "https://forums-sky-device-herald.trycloudflare.com/cupons"

// ================= FORMAT =================
const brl = v => Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

const numero = v => Number(v).toLocaleString("pt-BR", {
  minimumFractionDigits: 0,
  maximumFractionDigits: 0
})

// ================= NORMALIZA EMPRESA =================
function normalizarEmpresa(empBase, caixa){

  const nome = (empBase || "").toUpperCase()

  if(nome.includes("DELICIA")) return "DELICIA"
  if(nome.includes("VILLA")) return "VILLA"
  if(nome.includes("PADARIA")) return "PADARIA"

  if(nome.includes("MERCATTO")){
    if(caixa >= 1 && caixa <= 5) return "MERCATTO EMPÓRIO"
    if(caixa >= 6) return "MERCATTO RESTAURANTE"
  }

  return nome
}

// ================= PROCESS =================
function process(data){

  const result = {}

  data.forEach(v=>{

    if(v.cancelado) return

    const emp = normalizarEmpresa(v.empresa, Number(v.numero_caixa || 0))

    if(!result[emp]){
      result[emp] = {
        total:0,
        vendas:0,
        almocoTotal:0,
        almocoVendas:0
      }
    }

    const valor = Number(v.valor)

    result[emp].total += valor
    result[emp].vendas++

    // almoço
    const hora = Number(v.hora?.substring(0,2) || 0)
    if(hora >= 10 && hora < 15){
      result[emp].almocoTotal += valor
      result[emp].almocoVendas++
    }

  })

  return result
}

// ================= METAS =================
const METAS = {
  "DELÍCIA": { prata: 545000, ouro: 575000 },
  "VILLA": { prata: 746600, ouro: 833000 },
  "PADARIA": { prata: 720000, ouro: 750000 },
  "MERCATTO RESTAURANTE": { prata: 850000, ouro: 900000 },
  "MERCATTO EMPÓRIO": { prata: 650000, ouro: 690000 }
}

function getMetaEmpresa(nome){

  if(nome.includes("VILLA")) return METAS["VILLA"]
  if(nome.includes("PADARIA")) return METAS["PADARIA"]
  if(nome.includes("DELICIA")) return METAS["DELÍCIA"]
  if(nome.includes("RESTAURANTE")) return METAS["MERCATTO RESTAURANTE"]
  if(nome.includes("EMPÓRIO")) return METAS["MERCATTO EMPÓRIO"]

  return null
}

// ================= LOGO =================
function getLogo(emp){
  if(emp.includes("VILLA")) return "logo/villa.png"
  if(emp.includes("DELICIA")) return "logo/delicia.png"
  if(emp.includes("PADARIA")) return "logo/padaria.png"
  if(emp.includes("RESTAURANTE")) return "logo/mercatto.png"
  if(emp.includes("EMPÓRIO")) return "logo/emporio.png"
  return ""
}

// ================= RENDER =================
function render(dados){

  function montarCard(emp){

    const d = dados[emp] || {
      total:0,
      vendas:0,
      almocoTotal:0,
      almocoVendas:0
    }

    const ticket = d.vendas ? d.total / d.vendas : 0

    const meta = getMetaEmpresa(emp)

    let metasHTML = ""

    if(meta){
      const pct1 = Math.min((d.total/meta.prata)*100,100)
      const pct2 = Math.min((d.total/meta.ouro)*100,100)

      metasHTML = `
        <div class="metas">
          <div class="bola prata" style="--p:${pct1}%"><span>${pct1.toFixed(0)}%</span></div>
          <div class="bola ouro" style="--p:${pct2}%"><span>${pct2.toFixed(0)}%</span></div>
        </div>
      `
    }

    return `
      <div class="card-top">
        <div style="display:flex;gap:10px">
          <img src="${getLogo(emp)}" class="logo">
          <div>
            <div class="valor">${brl(d.total)}</div>
            <div class="vendas">${d.vendas} vendas</div>
            <div class="ticket-linha">Ticket: ${brl(ticket)}</div>
          </div>
        </div>
        ${metasHTML}
      </div>
    `
  }

  document.getElementById("villa").innerHTML = montarCard("VILLA")
  document.getElementById("delicia").innerHTML = montarCard("DELICIA")
  document.getElementById("padaria").innerHTML = montarCard("PADARIA")
  document.getElementById("restaurante").innerHTML = montarCard("MERCATTO RESTAURANTE")
  document.getElementById("emporio").innerHTML = montarCard("MERCATTO EMPÓRIO")

  // TOTAL GERAL
  let total = 0
  let vendas = 0

  Object.values(dados).forEach(d=>{
    total += d.total
    vendas += d.vendas
  })

  document.getElementById("barraResumo").innerHTML =
    `Hoje: <b>${brl(total)}</b> • ${vendas} vendas`
}

// ================= LOAD =================
async function load(){

  try{

    const res = await fetch(API_URL)
    const data = await res.json()

    const dados = process(data)

    render(dados)

  }catch(e){
    console.log("❌ Erro API:", e)
  }

}

// ================= START =================
window.addEventListener("DOMContentLoaded", async () => {

  await load()

  // 🔁 atualiza a cada 10s
  setInterval(load, 10000)

})

</script>
<div id="popupOverlay" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
">

  <div id="popupBox" style="
    background:white;
    border-radius:16px;
    padding:20px;
    width:90%;
    max-width:400px;
    max-height:80vh;
    overflow:auto;
  ">
    <div style="font-weight:800;margin-bottom:10px">Finalizadoras</div>
    <div id="popupContent"></div>
  </div>

</div>


  
</body>
</html>
