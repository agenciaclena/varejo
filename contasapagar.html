<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DASHBOARD DV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#0f172a;
  color:#fff;
}

header{
  padding:20px;
  font-weight:800;
  font-size:18px;
  background:#020617;
  display:flex;
  justify-content:space-between;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#020617;
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.empresa{
  font-size:12px;
  color:#94a3b8;
  font-weight:700;
}

.valor{
  font-size:28px;
  font-weight:800;
  color:#22c55e;
  margin:6px 0;
}

.small{
  font-size:12px;
  margin-top:4px;
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:4px;
}

hr{
  border:none;
  border-top:1px solid #1e293b;
  margin:10px 0;
}

</style>
</head>

<body>

<header>
  DASHBOARD DV
  <div id="status"></div>
</header>

<div id="grid" class="grid"></div>

<script>

// ================= SUPABASE =================
const sb = window.supabase.createClient(
  "https://opljdxaeatvqfntjnljt.supabase.co",
  "sb_publishable_16kakBOCh114FnCSZ0RaUw_pQYEiBZ5"
)

// ================= FORMAT =================
const brl = v => Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

// ================= PROCESS =================
function process(data){

  const result = {}

  const agora = new Date()
  const mesAtual = agora.getMonth()
  const mesAnterior = mesAtual === 0 ? 11 : mesAtual - 1

  data.forEach(v=>{

    const raw = lerJSONSeguro(v.raw)
    if(!raw) return

    const valor = Number(raw?.valor || 0)

    const dataVenda = new Date(
      raw?.dataHoraFechamentoCupom ||
      raw?.data ||
      Date.now()
    )

    const empresaBase = v.empresa_id

    // 🔥 SEPARAÇÃO MERCATTO
    let empresa = empresaBase

    const caixa = Number(raw?.caixa || raw?.numeroCaixa || 0)

    if(empresaBase === "VAREJO_URL_MERCATTO"){
      if(caixa <= 5) empresa = "MERCATTO EMPÓRIO"
      else empresa = "MERCATTO RESTAURANTE"
    }

    if(!result[empresa]){
      result[empresa] = {
        total:0,
        movimentos:0,
        mesAtual:0,
        mesAnterior:0,
        pagos:0,
        abertos:0,
        categorias:{},
        finais:{}
      }
    }

    const d = result[empresa]

    d.total += valor
    d.movimentos++

    // STATUS
    if(raw?.cancelada) d.abertos++
    else d.pagos++

    // MÊS
    const mes = dataVenda.getMonth()

    if(mes === mesAtual) d.mesAtual += valor
    if(mes === mesAnterior) d.mesAnterior += valor

    // PLANO DE CONTAS
    const categoria =
      raw?.planoDeContas ||
      raw?.categoria ||
      "OUTROS"

    d.categorias[categoria] =
      (d.categorias[categoria] || 0) + valor

    // FINALIZADORAS
    raw?.finalizacoes?.forEach(f=>{
      const nome = f?.descricao || "OUTROS"
      const val = Number(f.valor || 0)

      d.finais[nome] =
        (d.finais[nome] || 0) + val
    })

  })

  return result
}

// ================= RENDER =================
function render(dados){

  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  Object.keys(dados).forEach(emp=>{

    const d = dados[emp]

    const crescimento =
      d.mesAnterior > 0
        ? ((d.mesAtual - d.mesAnterior) / d.mesAnterior) * 100
        : 0

    grid.innerHTML += `
      <div class="card">

        <div class="empresa">${emp}</div>

        <div class="valor">${brl(d.total)}</div>

        <div class="small">📊 ${d.movimentos} movimentos</div>

        <div class="small">📅 Mês atual: ${brl(d.mesAtual)}</div>
        <div class="small">📅 Mês anterior: ${brl(d.mesAnterior)}</div>

        <div class="small" style="color:${crescimento>=0?'#22c55e':'#ef4444'}">
          📈 ${crescimento.toFixed(1)}%
        </div>

        <div class="small">
          ✅ ${d.pagos} | ❌ ${d.abertos}
        </div>

        <hr>

        <div class="small"><b>Plano de Contas</b></div>

        ${
          Object.entries(d.categorias)
          .sort((a,b)=>b[1]-a[1])
          .slice(0,5)
          .map(c=>`<div class="item">${c[0]} <b>${brl(c[1])}</b></div>`)
          .join("")
        }

        <hr>

        <div class="small"><b>Finalizadoras</b></div>

        ${
          Object.entries(d.finais)
          .sort((a,b)=>b[1]-a[1])
          .slice(0,5)
          .map(f=>`<div class="item">${f[0]} <b>${brl(f[1])}</b></div>`)
          .join("")
        }

      </div>
    `
  })

  document.getElementById("status").innerText =
    "Atualizado " + new Date().toLocaleTimeString()
}

// ================= LOAD =================
async function load(){

  let all = []
  let from = 0
  const step = 500

  while(true){

    const { data } = await sb
      .from("cupons_importados")
      .select("empresa_id,raw")
      .range(from, from + step - 1)

    if(!data || data.length === 0) break

    all = all.concat(data)

    if(data.length < step) break

    from += step
  }

  console.log("📊 TOTAL:", all.length)

  const dados = process(all)

  render(dados)
}

// ================= START =================
load()

setInterval(load, 10000)

// ================= JSON SAFE =================
function lerJSONSeguro(raw){
  try{
    if(typeof raw === "object") return raw
    return JSON.parse(raw)
  }catch{
    return null
  }
}

</script>

</body>
</html>
