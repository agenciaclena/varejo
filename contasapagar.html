<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>DASHBOARD FINANCEIRO DV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
}

header{
  padding:20px;
  font-weight:bold;
  background:#020617;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#020617;
  padding:15px;
  border-radius:12px;
}

.valor{
  font-size:26px;
  color:#22c55e;
  font-weight:bold;
}

.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}
</style>
</head>

<body>

<header>DASHBOARD FINANCEIRO (F360)</header>

<div id="grid" class="grid"></div>

<script>

// ================= SUPABASE =================
const sb = window.supabase.createClient(
  "https://opljdxaeatvqfntjnljt.supabase.co",
  "sb_publishable_16kakBOCh114FnCSZ0RaUw_pQYEiBZ5"
)

// ================= FORMAT =================
const brl = v => Number(v || 0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

// ================= PROCESS =================
function process(data){

  const result = {}

  data.forEach(v=>{

    const empresa = v.empresa || "SEM EMPRESA"
    const valor = Number(v.valor || 0)

    if(!result[empresa]){
      result[empresa] = {
        total:0,
        quantidade:0,
        aberto:0,
        pago:0,
        categorias:{}
      }
    }

    const d = result[empresa]

    d.total += valor
    d.quantidade++

    // STATUS
    if(v.status?.includes("Aberto")){
      d.aberto++
    }else{
      d.pago++
    }

    // 🔥 PLANO DE CONTAS (VEM DO JSON RAW)
    const raw = v.raw || {}

    if(raw?.Rateio){
      raw.Rateio.forEach(r=>{

        const nome = r.PlanoDeContas || "OUTROS"
        const val = Number(r.Valor || 0)

        d.categorias[nome] =
          (d.categorias[nome] || 0) + val
      })
    }

  })

  return result
}

// ================= RENDER =================
function render(dados){

  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  Object.keys(dados).forEach(emp=>{

    const d = dados[emp]

    grid.innerHTML += `
      <div class="card">

        <div>${emp}</div>

        <div class="valor">${brl(d.total)}</div>

        <div>${d.quantidade} lançamentos</div>

        <div style="font-size:12px">
          🟡 Abertos: ${d.aberto}
          <br>
          🟢 Pagos: ${d.pago}
        </div>

        <hr>

        ${
          Object.entries(d.categorias)
          .sort((a,b)=>b[1]-a[1])
          .map(c=>`<div class="item">${c[0]} <b>${brl(c[1])}</b></div>`)
          .join("")
        }

      </div>
    `
  })

}

// ================= LOAD =================
async function load(){

  const { data } = await sb
    .from("f360_parcelas")
    .select("*")

  console.log("F360 DATA:", data)

  const dados = process(data)

  render(dados)
}

// ================= START =================
load()
setInterval(load, 10000)

</script>

</body>
</html>
