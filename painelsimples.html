<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL DV</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>

:root{
  --bg:#f1f5f9;
  --card:#ffffff;
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#ef4444;
  --warning:#f59e0b;
  --dark:#0f172a;
  --text:#0f172a;
  --sub:#64748b;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

/* ================= HEADER ================= */
header{
  background:var(--dark);
  color:#fff;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:10;
}

header div:first-child{
  font-size:18px;
  font-weight:800;
  letter-spacing:0.5px;
}

#status{
  font-size:12px;
  opacity:0.7;
}

/* ================= CONTROLS ================= */
.controls{
  padding:15px;
  background:#fff;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  border-bottom:1px solid #e5e7eb;
}

input,button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:13px;
}

button{
  background:var(--primary);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

/* ================= KPI ================= */
#kpis{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  padding:15px;
}

.kpi{
  background:linear-gradient(180deg,#fff,#f8fafc);
  border-radius:14px;
  padding:18px;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
}

.kpi .label{
  font-size:12px;
  color:var(--sub);
}

.kpi .value{
  font-size:22px;
  font-weight:800;
  margin-top:5px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  padding:20px;
}

/* ================= CARD ================= */
.card{
  background:linear-gradient(180deg,#ffffff,#f8fafc);
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:all 0.2s ease;
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.empresa{
  font-size:13px;
  color:var(--sub);
  font-weight:700;
  margin-bottom:6px;
}

.valor{
  font-size:30px;
  font-weight:800;
  color:var(--success);
  transition:0.3s;
}

/* ================= LISTA ================= */
.item{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:4px;
  border-bottom:1px dashed #e5e7eb;
  padding-bottom:2px;
}

/* ================= METAS ================= */
.metas{
  display:flex;
  gap:20px;
  margin-top:12px;
}

.bola{
  width:80px;
  height:80px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:800;
  position:relative;
}

.bola::before{
  content:"";
  position:absolute;
  width:60px;
  height:60px;
  background:#fff;
  border-radius:50%;
}

.bola span{
  position:relative;
  z-index:2;
}

/* PRATA */
.prata{
  background:conic-gradient(#2563eb var(--p), #e5e7eb 0);
}

/* OURO */
.ouro{
  background:conic-gradient(#eab308 var(--p), #e5e7eb 0);
}

/* ================= BADGES ================= */
.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  margin-top:6px;
}

.badge-success{
  background:#dcfce7;
  color:#166534;
}

.badge-danger{
  background:#fee2e2;
  color:#991b1b;
}

.badge-warning{
  background:#fef3c7;
  color:#92400e;
}

/* ================= BOXES ================= */
.box{
  margin-top:8px;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.box-gray{
  background:#f1f5f9;
}

.box-dark{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ================= LOADING ================= */
#loading{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  z-index:999;
}





  









  
</style>
</head>

<body>

<header>
  <div>PAINEL DV</div>
  <div id="status"></div>
</header>

<div class="controls">
<input type="date" id="inicio">
<input type="date" id="fim">
  <button onclick="reload()">Aplicar</button>
</div>

<div id="periodo" style="
  padding:10px 15px;
  color:#64748b;
  font-size:12px;
"></div>

<!-- KPI TOPO -->
<div id="kpis"></div>

<!-- GRID -->
<div id="grid" class="grid"></div>

<!-- GRÁFICO -->
<div style="padding:20px">
  <canvas id="grafico"></canvas>
</div>

<!-- LOADING -->
<div id="loading">
  ⏳ Carregando dados...
</div>

<script>

// ================= SUPABASE =================
const sb = window.supabase.createClient(
  "https://opljdxaeatvqfntjnljt.supabase.co",
  "sb_publishable_16kakBOCh114FnCSZ0RaUw_pQYEiBZ5"
)

// ================= MAPA FINALIZADORAS =================
const MAPA = {

VAREJO_URL_PADARIA: {
  1:"DINHEIRO",

  0:"SEM FATURAMENTO"
},

VAREJO_URL_VILLA: {

  22:"PIX POS",

  27:"BONIFICACAO GERENCIA",
  28:"CARTAO DEBITO VCH",
  29:"CARTAO CREDITO VCH",
  30:"PIX ITAU VCH"
},

VAREJO_URL_DELICIA: {
  1:"DINHEIRO",
  2:"CARTAO DE CREDITO",
  3:"CARTAO DE DEBITO",
  4:"CONSUMO FUNCIONARIOS",
  5:"CREDIARIO CLIENTES",
  7:"VOUCHER",
  8:"PAGAMENTOS ONLINE",
  10:"CONSUMO MUSICOS",
  11:"CREDITO POS",
  12:"DEBITO POS",
  13:"CLIENTES EM DEBITO",

  15:"CHEQUE",

},

VAREJO_URL_MERCATTO: {
  1:"DINHEIRO",

  3:"CARTAO DEBITO TEF",
  4:"PIX CNPJ",
  5:"CONSUMO FUNCIONARIOS",

  23:"BOLETO MEOS GOURMET",

  25:"BOLETO MERCATTO KIDS",

  29:"VOUCHER",

  36:"PREJUIZO"
}

}

// ================= FORMAT =================
const brl = v => Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})

// ================= LOAD =================
async function load(){

document.getElementById("loading").style.display="flex"

const inicio = document.getElementById("inicio").value
const fim = document.getElementById("fim").value

const { data, error } = await sb
.from("resumo_varejo")
.select("*")
.gte("data_operacional", inicio)
.lte("data_operacional", fim)

if(error){
  console.log(error)
  return
}

// ================= PROCESS =================
const result = {}

data.forEach(r=>{

const emp = r.empresa
const nomeFinal = MAPA[emp]?.[r.finalizadora_id] || "OUTROS"

if(!result[emp]){
  result[emp] = {
    total:0,
    finais:{}
  }
}

result[emp].total += Number(r.valor_total)

result[emp].finais[nomeFinal] =
  (result[emp].finais[nomeFinal] || 0) + Number(r.valor_total)

})

// ================= RENDER =================
render(result)

document.getElementById("loading").style.display="none"

}

// ================= RENDER =================
function render(dados){

const grid = document.getElementById("grid")
grid.innerHTML=""

Object.keys(dados).forEach(emp=>{

const d = dados[emp]

grid.innerHTML += `
<div class="card">

<div class="empresa">${emp}</div>
<div class="valor">${brl(d.total)}</div>

${Object.entries(d.finais)
.sort((a,b)=>b[1]-a[1])
.map(f=>`
<div class="item">
  ${f[0]} 
  <b>${brl(f[1])}</b>
</div>
`).join("")}

</div>
`

})

}

// ================= INIT =================
function init(){

const hoje = new Date()
const inicio = hoje.toISOString().split("T")[0]

document.getElementById("inicio").value = inicio
document.getElementById("fim").value = inicio

load()

}

init()

</script>
</body>
</html>
