<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IMPORTAÇÃO PROFISSIONAL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:#fff;
}

/* HEADER */
header{
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  display:flex;
  gap:10px;
  align-items:center;
}

input, button{
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  background:#16a34a;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#22c55e;
}

/* GRID 4 TELAS */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  height:calc(100vh - 70px);
  gap:10px;
  padding:10px;
}

.card{
  background:#0f172a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER CARD */
.card-header{
  padding:10px;
  font-weight:600;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
}

/* STATUS */
.status{
  font-size:11px;
  opacity:0.7;
}

/* LOG */
.log{
  flex:1;
  overflow:auto;
  padding:10px;
  font-family:monospace;
  font-size:11px;
  background:#000;
}

/* TIPOS */
.line{ margin-bottom:3px; }
.info{ color:#38bdf8 }
.success{ color:#22c55e }
.warn{ color:#f59e0b }
.error{ color:#ef4444 }
.highlight{ color:#eab308; font-weight:bold }
.sep{ color:#64748b }

/* PROGRESS */
.progress{
  height:4px;
  background:#1e293b;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}

</style>
</head>

<body>

<header>

<label>Data início:</label>
<input type="date" id="dataInicio">

<label>Data fim:</label>
<input type="date" id="dataFim">

<button onclick="executarTudo()">🚀 Executar Tudo</button>

</header>

<div class="grid">

<div class="card" id="card_MERCATTO">
  <div class="card-header">
    MERCATTO
    <span class="status" id="status_MERCATTO">Aguardando</span>
  </div>
  <div class="progress"><div class="bar" id="bar_MERCATTO"></div></div>
  <div class="log" id="log_MERCATTO"></div>
</div>

<div class="card" id="card_VILLA">
  <div class="card-header">
    VILLA
    <span class="status" id="status_VILLA">Aguardando</span>
  </div>
  <div class="progress"><div class="bar" id="bar_VILLA"></div></div>
  <div class="log" id="log_VILLA"></div>
</div>

<div class="card" id="card_PADARIA">
  <div class="card-header">
    PADARIA
    <span class="status" id="status_PADARIA">Aguardando</span>
  </div>
  <div class="progress"><div class="bar" id="bar_PADARIA"></div></div>
  <div class="log" id="log_PADARIA"></div>
</div>

<div class="card" id="card_DELICIA">
  <div class="card-header">
    DELÍCIA
    <span class="status" id="status_DELICIA">Aguardando</span>
  </div>
  <div class="progress"><div class="bar" id="bar_DELICIA"></div></div>
  <div class="log" id="log_DELICIA"></div>
</div>

</div>

<script>

const empresas = [
  {nome:"MERCATTO", value:"VAREJO_URL_MERCATTO"},
  {nome:"VILLA", value:"VAREJO_URL_VILLA"},
  {nome:"PADARIA", value:"VAREJO_URL_PADARIA"},
  {nome:"DELICIA", value:"VAREJO_URL_DELICIA"}
]

// 🎨 LOG ORGANIZADO
function addLog(nome, text){

  const logDiv = document.getElementById("log_"+nome)

  const el = document.createElement("div")
  el.classList.add("line")

  if(text.includes("❌")) el.classList.add("error")
  else if(text.includes("⚠️")) el.classList.add("warn")
  else if(text.includes("✅")) el.classList.add("success")
  else if(text.includes("📊")) el.classList.add("highlight")
  else if(text.includes("━━")) el.classList.add("sep")
  else el.classList.add("info")

  el.textContent = text

  logDiv.appendChild(el)
  logDiv.scrollTop = logDiv.scrollHeight
}

// 🔄 EXECUTAR UMA EMPRESA
async function executarEmpresa(emp){

  const nome = emp.nome
  const status = document.getElementById("status_"+nome)
  const bar = document.getElementById("bar_"+nome)
  const logDiv = document.getElementById("log_"+nome)

  logDiv.innerHTML = ""
  bar.style.width = "0%"

  status.innerText = "Executando..."

  addLog(nome,"━━━━━━━━━━━━━━━━")
  addLog(nome,"🚀 Iniciando...")
  addLog(nome,"━━━━━━━━━━━━━━━━")

  const response = await fetch("/api/importar-cupons",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      empresa: emp.value,
      dataInicio: document.getElementById("dataInicio").value,
      dataFim: document.getElementById("dataFim").value
    })
  })

  const reader = response.body.getReader()
  const decoder = new TextDecoder()

  let buffer = ""
  let progresso = 0

  while(true){
    const { done, value } = await reader.read()
    if(done) break

    buffer += decoder.decode(value)

    const linhas = buffer.split("\n")
    buffer = linhas.pop()

    linhas.forEach(linha=>{
      if(linha.trim()){

        addLog(nome,linha)

        // 📊 progresso fake inteligente
        progresso += 2
        if(progresso > 100) progresso = 100
        bar.style.width = progresso + "%"
      }
    })
  }

  bar.style.width = "100%"
  status.innerText = "Finalizado"

  addLog(nome,"━━━━━━━━━━━━━━━━")
  addLog(nome,"🏁 FINALIZADO")
  addLog(nome,"━━━━━━━━━━━━━━━━")
}

// 🚀 EXECUTAR TODAS (SIMULTÂNEO)
async function executarTudo(){

  await Promise.all(
    empresas.map(emp => executarEmpresa(emp))
  )

}

</script>

</body>
</html>
