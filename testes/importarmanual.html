<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Importação de Cupons</title>

<style>
body{
  font-family:Inter;
  background:#020617;
  color:#fff;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  max-width:600px;
  margin:auto;
}

input, select, button{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#16a34a;
  font-weight:bold;
  cursor:pointer;
}

#log{
  background:#000;
  padding:15px;
  border-radius:10px;
  height:300px;
  overflow:auto;
  margin-top:15px;
  font-family:monospace;
  font-size:12px;
}
</style>
</head>

<body>

<div class="card">

<h2>🚀 Importar Cupons (Manual)</h2>

<select id="empresa">
  <option value="VAREJO_URL_DELICIA">DELÍCIA</option>
  <option value="VAREJO_URL_VILLA">VILLA</option>
  <option value="VAREJO_URL_PADARIA">PADARIA</option>
  <option value="VAREJO_URL_MERCATTO">MERCATTO</option>
</select>

<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<button onclick="executar()">🚀 Executar Importação</button>

<div id="log"></div>

</div>

<script>

async function executar(){

  const empresa = document.getElementById("empresa").value
  const dataInicio = document.getElementById("dataInicio").value
  const dataFim = document.getElementById("dataFim").value

  const logDiv = document.getElementById("log")
  logDiv.innerHTML = "⏳ Iniciando...\n"

  const response = await fetch("/api/importar-cupons",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      empresa,
      dataInicio,
      dataFim
    })
  })

  const reader = response.body.getReader()
  const decoder = new TextDecoder()

  while(true){
    const { done, value } = await reader.read()
    if(done) break

    const chunk = decoder.decode(value)
    logDiv.innerHTML += chunk
    logDiv.scrollTop = logDiv.scrollHeight
  }

}

</script>

</body>
</html>
