<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IMPORTAÇÃO PROFISSIONAL</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:#fff;
}

/* HEADER */
header{
  padding:15px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  display:flex;
  gap:10px;
  align-items:center;
}

input, button{
  padding:10px;
  border-radius:6px;
  border:none;
  font-size:14px;
}

button{
  background:#16a34a;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  background:#22c55e;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  height:calc(100vh - 70px);
  gap:10px;
  padding:10px;
}

.card{
  background:#0f172a;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* HEADER CARD */
.card-header{
  padding:12px;
  font-weight:700;
  font-size:15px;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
}

/* STATUS */
.status{
  font-size:13px;
  opacity:0.8;
}

/* KPI NOVO */
.kpi{
  display:flex;
  justify-content:space-between;
  padding:8px 12px;
  font-size:13px;
  border-bottom:1px solid #1e293b;
}

.kpi div{
  display:flex;
  flex-direction:column;
}

.kpi span{
  font-weight:700;
  font-size:15px;
  color:#22c55e;
}

/* LOG */
.log{
  flex:1;
  overflow:auto;
  padding:12px;
  font-family:monospace;
  font-size:13px;
  background:#000;
}

/* TIPOS */
.line{ margin-bottom:4px; }
.info{ color:#38bdf8 }
.success{ color:#22c55e }
.warn{ color:#f59e0b }
.error{ color:#ef4444 }
.highlight{ color:#eab308; font-weight:bold }
.sep{ color:#64748b }

/* PROGRESS */
.progress{
  height:5px;
  background:#1e293b;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}

</style>
</head>

<body>

<header>

<label>Data início:</label>
<input type="date" id="dataInicio">

<label>Data fim:</label>
<input type="date" id="dataFim">

<button onclick="executarTudo()">🚀 Executar Tudo</button>

</header>

<div class="grid">

<!-- MERCATTO -->
<div class="card">
  <div class="card-header">
    MERCATTO
    <span class="status" id="status_MERCATTO">Aguardando</span>
  </div>

  <div class="kpi">
    <div>💰 Total<span id="total_MERCATTO">R$ 0,00</span></div>
    <div>📅 Dia<span id="dia_MERCATTO">-</span></div>
  </div>

  <div class="progress"><div class="bar" id="bar_MERCATTO"></div></div>
  <div class="log" id="log_MERCATTO"></div>
</div>

<!-- VILLA -->
<div class="card">
  <div class="card-header">
    VILLA
    <span class="status" id="status_VILLA">Aguardando</span>
  </div>

  <div class="kpi">
    <div>💰 Total<span id="total_VILLA">R$ 0,00</span></div>
    <div>📅 Dia<span id="dia_VILLA">-</span></div>
  </div>

  <div class="progress"><div class="bar" id="bar_VILLA"></div></div>
  <div class="log" id="log_VILLA"></div>
</div>

<!-- PADARIA -->
<div class="card">
  <div class="card-header">
    PADARIA
    <span class="status" id="status_PADARIA">Aguardando</span>
  </div>

  <div class="kpi">
    <div>💰 Total<span id="total_PADARIA">R$ 0,00</span></div>
    <div>📅 Dia<span id="dia_PADARIA">-</span></div>
  </div>

  <div class="progress"><div class="bar" id="bar_PADARIA"></div></div>
  <div class="log" id="log_PADARIA"></div>
</div>

<!-- DELICIA -->
<div class="card">
  <div class="card-header">
    DELÍCIA
    <span class="status" id="status_DELICIA">Aguardando</span>
  </div>

  <div class="kpi">
    <div>💰 Total<span id="total_DELICIA">R$ 0,00</span></div>
    <div>📅 Dia<span id="dia_DELICIA">-</span></div>
  </div>

  <div class="progress"><div class="bar" id="bar_DELICIA"></div></div>
  <div class="log" id="log_DELICIA"></div>
</div>

</div>


<script>

const empresas = [
  {nome:"MERCATTO", value:"VAREJO_URL_MERCATTO"},
  {nome:"VILLA", value:"VAREJO_URL_VILLA"},
  {nome:"PADARIA", value:"VAREJO_URL_PADARIA"},
  {nome:"DELICIA", value:"VAREJO_URL_DELICIA"}
]

// 🧠 CONTROLE TOTAL
const controle = {}

function resetControle(nome){
  controle[nome] = {
    repetidas:0,
    total:0,
    cupons:0,
    cancelados:0,
    paginas:0,
    finalizadoras:new Set(),
    inicio:Date.now(),
    erro:null,
    finalizado:false
  }
}

// 🎨 LOG
function addLog(nome, text){

  const logDiv = document.getElementById("log_"+nome)

  const el = document.createElement("div")
  el.classList.add("line")

  if(text.includes("❌")) el.classList.add("error")
  else if(text.includes("⚠️")) el.classList.add("warn")
  else if(text.includes("✅")) el.classList.add("success")
  else if(text.includes("📊")) el.classList.add("highlight")
  else if(text.includes("━━")) el.classList.add("sep")
  else el.classList.add("info")

  el.textContent = text

  logDiv.appendChild(el)
  logDiv.scrollTop = logDiv.scrollHeight

  processarDados(nome, text)
}

// 🧠 PROCESSAMENTO
function processarDados(nome, linha){

  const c = controle[nome]
  if(c.finalizado) return

  // REPETIÇÃO
  if(linha.includes("Página repetida")){
    c.repetidas++

    if(c.repetidas >= 2){
      finalizarEmpresa(nome)
      return
    }
  }

  // CUPOM
  if(linha.includes("🧾 Cupom")){
    c.cupons++

    const valor = linha.match(/R\$ ([\d\.]+)/)
    if(valor){
      c.total += Number(valor[1])
    }
  }

  // CANCELADOS
  if(linha.toLowerCase().includes("cancelado")){
    c.cancelados++
  }

  // PAGINAS
  if(linha.includes("Página")){
    c.paginas++
  }

  // FINALIZADORAS
  const f = linha.match(/finalizadora_id[:= ](\d+)/)
  if(f){
    c.finalizadoras.add(f[1])
  }

  // ERRO
  if(linha.includes("❌")){
    c.erro = linha
  }
}

// 🎯 POPUP FINAL PROFISSIONAL
function finalizarEmpresa(nome){

  const c = controle[nome]
  if(c.finalizado) return

  c.finalizado = true

  const tempo = ((Date.now() - c.inicio)/1000).toFixed(1)

  const card = document.getElementById("log_"+nome).parentElement

  const overlay = document.createElement("div")
  overlay.style.position = "absolute"
  overlay.style.inset = "0"
  overlay.style.background = "rgba(0,0,0,0.96)"
  overlay.style.display = "flex"
  overlay.style.alignItems = "center"
  overlay.style.justifyContent = "center"
  overlay.style.zIndex = "20"

  const box = document.createElement("div")
  box.style.background = "#0f172a"
  box.style.padding = "25px"
  box.style.borderRadius = "12px"
  box.style.width = "85%"
  box.style.maxWidth = "320px"
  box.style.textAlign = "center"
  box.style.boxShadow = "0 0 30px rgba(0,0,0,0.6)"

  box.innerHTML = `
    <h2 style="margin:0 0 10px 0;color:#22c55e">✔ IMPORTAÇÃO FINALIZADA</h2>

    <div style="font-size:13px;margin-bottom:10px;opacity:0.7">${nome}</div>

    <div style="display:grid;gap:6px;font-size:13px">

      <div>🧾 <b>Cupons:</b> ${c.cupons}</div>
      <div>❌ <b>Cancelados:</b> ${c.cancelados}</div>
      <div>📄 <b>Páginas:</b> ${c.paginas}</div>
      <div>⏱ <b>Tempo:</b> ${tempo}s</div>

      <div style="margin-top:8px;color:#22c55e;font-size:15px">
        💰 ${c.total.toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
      </div>

      <div style="margin-top:10px;font-size:12px">
        <b>Finalizadoras:</b><br>
        ${[...c.finalizadoras].join(", ") || "-"}
      </div>

      ${
        c.erro
        ? `<div style="margin-top:10px;color:#ef4444;font-size:12px">${c.erro}</div>`
        : ""
      }

    </div>

    <button onclick="this.closest('.overlay').remove()"
      style="margin-top:15px;padding:8px 12px;background:#22c55e;border:none;border-radius:6px;cursor:pointer;font-weight:600">
      Fechar
    </button>
  `

  overlay.classList.add("overlay")
  overlay.appendChild(box)

  card.style.position = "relative"
  card.appendChild(overlay)
}

// 🚀 EXECUÇÃO
async function executarEmpresa(emp){

  const nome = emp.nome
  const status = document.getElementById("status_"+nome)
  const bar = document.getElementById("bar_"+nome)

  resetControle(nome)

  document.getElementById("log_"+nome).innerHTML = ""

  bar.style.width = "0%"
  status.innerText = "Executando..."

  const response = await fetch("/api/importar-cupons",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      empresa: emp.value,
      dataInicio: document.getElementById("dataInicio").value,
      dataFim: document.getElementById("dataFim").value
    })
  })

  const reader = response.body.getReader()
  const decoder = new TextDecoder()

  let buffer = ""
  let progresso = 0

  while(true){

    const { done, value } = await reader.read()
    if(done) break

    buffer += decoder.decode(value)

    const linhas = buffer.split("\n")
    buffer = linhas.pop()

    for(const linha of linhas){
      if(linha.trim()){
        addLog(nome,linha)

        // 🔥 SE FINALIZOU → PARA LOOP
        if(controle[nome].finalizado){
          status.innerText = "Finalizado"
          bar.style.width = "100%"
          return
        }

        progresso += 2
        if(progresso > 100) progresso = 100
        bar.style.width = progresso + "%"
      }
    }
  }

  status.innerText = "Finalizado"
  bar.style.width = "100%"

  finalizarEmpresa(nome)
}

// 🔥 EXECUTA TODAS
async function executarTudo(){
  await Promise.all(empresas.map(e => executarEmpresa(e)))
}

</script>

</body>
</html>
