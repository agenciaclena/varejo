<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IMPORTADOR VAREJO FÁCIL PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#020617;
  color:#fff;
}

header{
  padding:15px;
  display:flex;
  gap:10px;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

input,button{
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.container{
  padding:20px;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:20px;
}

.kpis{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.kpi{
  flex:1;
  background:#020617;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.kpi span{
  display:block;
  font-size:22px;
  font-weight:800;
  color:#22c55e;
}

.bar{
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin:15px 0;
}

.bar-inner{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:0.3s;
}

.log{
  height:300px;
  overflow:auto;
  background:#020617;
  padding:10px;
  font-family:monospace;
  font-size:12px;
}
</style>
</head>

<body>

<header>
<input type="date" id="dataInicio">
<input type="date" id="dataFim">

<button onclick="buscar()">🔍 Buscar</button>
<button onclick="inserir10()">💾 Inserir 10</button>
<button onclick="inserirTudo()">🚀 Inserir Tudo</button>
</header>

<div class="container">

<div class="card">

<div class="kpis">
  <div class="kpi">Cupons<span id="totalCupons">0</span></div>
  <div class="kpi">Inseridos<span id="inseridos">0</span></div>
  <div class="kpi">Restantes<span id="restantes">0</span></div>
  <div class="kpi">Total R$<span id="valorTotal">0,00</span></div>
</div>

<div class="bar">
  <div class="bar-inner" id="barra"></div>
</div>

<div class="log" id="log"></div>

</div>

</div>

<script>

let cupons = []
let ponteiro = 0
let inseridos = 0

function log(txt){
  const el = document.createElement("div")
  el.innerText = txt
  document.getElementById("log").appendChild(el)
}

function format(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

// 🔍 BUSCAR CUPONS
async function buscar(){

  document.getElementById("log").innerHTML = ""
  log("🔍 Buscando cupons...")

  const res = await fetch("/api/cupons-vf-pro",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      dataInicio: document.getElementById("dataInicio").value,
      dataFim: document.getElementById("dataFim").value,
      modo:"BUSCAR"
    })
  })

  const json = await res.json()

  cupons = json.cupons || []
  ponteiro = 0
  inseridos = 0

  let total = 0

  cupons.forEach(c=>{
    total += Number(c.valor || 0)
  })

  document.getElementById("totalCupons").innerText = cupons.length
  document.getElementById("valorTotal").innerText = format(total)
  document.getElementById("restantes").innerText = cupons.length

  log("✅ Total de cupons: " + cupons.length)
}

// 💾 INSERIR 10
async function inserir10(){

  if(ponteiro >= cupons.length){
    log("✅ Finalizado")
    return
  }

  const lote = cupons.slice(ponteiro, ponteiro + 10)

  await fetch("/api/cupons-vf-pro",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      cupons: lote,
      modo:"INSERIR"
    })
  })

  ponteiro += lote.length
  inseridos += lote.length

  atualizarUI()

  log("📦 Inseridos: " + lote.length)
}

// 🚀 INSERIR TUDO AUTOMÁTICO
async function inserirTudo(){

  while(ponteiro < cupons.length){
    await inserir10()
    await new Promise(r=>setTimeout(r,200))
  }

  log("🔥 FINALIZADO TOTAL")
}

// UI
function atualizarUI(){

  document.getElementById("inseridos").innerText = inseridos
  document.getElementById("restantes").innerText = cupons.length - ponteiro

  const pct = (ponteiro / cupons.length) * 100
  document.getElementById("barra").style.width = pct + "%"
}

</script>

</body>
</html>
