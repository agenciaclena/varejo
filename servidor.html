<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PAINEL VENDAS</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

header{
  padding:15px;
  display:flex;
  gap:10px;
  align-items:center;
  background:#020617;
  border-bottom:1px solid #1e293b;
}

select,input,button{
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.card{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  border:1px solid #1e293b;
}

.valor{
  font-size:26px;
  color:#22c55e;
  font-weight:bold;
}

.sub{
  color:#94a3b8;
  font-size:12px;
}
</style>
</head>

<body>

<header>

<input type="date" id="data">

<select id="empresa">
  <option value="TODAS">Todas</option>
  <option value="VAREJO_URL_DELICIA">Delícia</option>
  <option value="VAREJO_URL_VILLA">Villa</option>
  <option value="VAREJO_URL_PADARIA">Padaria</option>
  <option value="VAREJO_URL_MERCATTO">Mercatto</option>
</select>

<button onclick="carregar()">Carregar</button>

</header>

<div class="grid" id="grid"></div>

<script>

const API = "http://localhost:3000/resumo-dia"

// 🔥 FORMATAR REAL
function brl(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

// 🔥 CONVERTE HORA 1448 → 14:48
function formatHora(h){
  if(!h) return "00:00"
  return h.slice(0,2)+":"+h.slice(2)
}

// 🔥 PROCESSAR
function processar(data){

  const mapa = {}

  data.forEach(v=>{

    const emp = v.empresa

    if(!mapa[emp]){
      mapa[emp] = {
        total:0,
        vendas:0,
        finais:{}
      }
    }

    mapa[emp].total += Number(v.valor_pagamento || v.valor)
    mapa[emp].vendas++

    const nomeFinal = v.finalizadora_nome || v.finalizadora_id || "OUTROS"

    mapa[emp].finais[nomeFinal] =
      (mapa[emp].finais[nomeFinal] || 0) + Number(v.valor_pagamento || v.valor)

  })

  return mapa
}

// 🔥 RENDER
function render(dados){

  const grid = document.getElementById("grid")

  grid.innerHTML = ""

  Object.keys(dados).forEach(emp=>{

    const d = dados[emp]

    const finais = Object.entries(d.finais)
      .map(f=> `<div class="sub">${f[0]}: ${brl(f[1])}</div>`)
      .join("")

    grid.innerHTML += `
      <div class="card">
        <div>${emp}</div>
        <div class="valor">${brl(d.total)}</div>
        <div class="sub">${d.vendas} vendas</div>
        <hr>
        ${finais}
      </div>
    `
  })
}

// 🔥 FILTRO
function filtrar(data){

  const dataSelecionada = document.getElementById("data").value
  const empresaSelecionada = document.getElementById("empresa").value

  return data.filter(v=>{

    // DATA
    if(dataSelecionada && v.data !== dataSelecionada){
      return false
    }

    // EMPRESA
    if(empresaSelecionada !== "TODAS" && v.empresa !== empresaSelecionada){
      return false
    }

    return true
  })
}

// 🔥 CARREGAR
async function carregar(){

  try{

    const res = await fetch(API)
    const json = await res.json()

    console.log("📡 API:", json)

    const filtrado = filtrar(json)

    const processado = processar(filtrado)

    render(processado)

  }catch(e){
    console.error("❌ ERRO:", e)
  }
}

// 🔥 AUTO HOJE
document.addEventListener("DOMContentLoaded", ()=>{

  const hoje = new Date().toISOString().slice(0,10)

  document.getElementById("data").value = hoje

  carregar()

})

</script>

</body>
</html>
